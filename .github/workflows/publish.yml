name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to npm & Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        registry-url: 'https://registry.npmjs.org'

    - name: Install dependencies
      run: npm install

    - name: Validate JS syntax
      run: |
        node --check bin/yida.js
        for f in lib/*.js; do node --check "$f"; done
        echo "✅ 所有 JS 文件语法检查通过"

    - name: Publish to npm
      run: npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Package yida-skills.zip
      run: |
        cd ${{ github.workspace }}
        zip -r yida-skills.zip yida-skills/
        echo "✅ yida-skills.zip 打包完成，大小：$(du -sh yida-skills.zip | cut -f1)"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: ${{ github.ref_name }}
        files: yida-skills.zip
        body: |
          ## 安装 / 更新

          ```bash
          npm install -g openyida
          ```

          安装后即可在 Claude Code / OpenCode / Aone Copilot / Cursor 中直接使用，零配置。

          ## yida-skills 技能包

          下载 `yida-skills.zip` 可手动解压到项目目录使用，或通过以下命令自动安装：

          ```bash
          openyida copy
          ```

          ## 更新日志

          请查看 [提交记录](https://github.com/openyida/openyida/commits/main) 了解详情。
        generate_release_notes: true
