name: Update Contributors

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

jobs:
  update-contributors:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Update README contributors
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import subprocess
          import json
          import re
          import sys
          import os

          repo = os.environ["REPO"]
          print("📋 获取仓库所有贡献者...")

          # 从 GitHub API 获取所有贡献者
          # 使用 --jq 让 gh 自动合并分页结果为单个数组
          result = subprocess.run(
              ["gh", "api", f"repos/{repo}/contributors?per_page=100&anon=false",
               "--paginate", "--jq", ".[]"],
              capture_output=True, text=True
          )
          if result.returncode != 0:
              print(f"⚠️  获取贡献者失败: {result.stderr}")
              sys.exit(0)

          # --jq '.[]' 输出每个对象一行 JSON，逐行解析
          raw = result.stdout.strip()
          all_contributors = []
          if raw:
              for line in raw.split("\n"):
                  line = line.strip()
                  if not line:
                      continue
                  try:
                      all_contributors.append(json.loads(line))
                  except json.JSONDecodeError as e:
                      print(f"⚠️  JSON 解析失败: {e}, line: {line[:100]}")

          if not all_contributors:
              # 回退方案：不使用 --jq，直接解析完整 JSON
              print("⚠️  --jq 方式未获取到数据，尝试直接解析...")
              result2 = subprocess.run(
                  ["gh", "api", f"repos/{repo}/contributors?per_page=100&anon=false"],
                  capture_output=True, text=True
              )
              if result2.returncode == 0 and result2.stdout.strip():
                  try:
                      all_contributors = json.loads(result2.stdout)
                  except json.JSONDecodeError as e:
                      print(f"⚠️  回退 JSON 解析失败: {e}")

          if not all_contributors:
              print("⚠️  未获取到贡献者数据，跳过更新")
              sys.exit(0)

          print(f"✅ 共获取到 {len(all_contributors)} 位贡献者")

          # 读取当前 README
          with open("README.md", "r", encoding="utf-8") as f:
              readme_content = f.read()

          # 提取 README 中已有的贡献者用户名（小写，去重）
          existing_users = set(
              u.lower() for u in re.findall(r'href="https://github\.com/([^"]+)"', readme_content)
          )
          print(f"=== 当前 README 中已有贡献者 ===")
          for u in sorted(existing_users):
              print(f"  - {u}")

          # 机器人账号关键词（跳过）
          bot_patterns = re.compile(r'\[bot\]|dependabot|github-actions|renovate|actions-user', re.IGNORECASE)

          # 找出新贡献者，按贡献数量排序（API 返回已按贡献数降序）
          new_html_parts = []
          for contributor in all_contributors:
              login = contributor.get("login", "")
              avatar_url = contributor.get("avatar_url", "")
              html_url = contributor.get("html_url", f"https://github.com/{login}")

              if not login:
                  continue

              # 跳过机器人
              if bot_patterns.search(login):
                  print(f"  🤖 跳过机器人: {login}")
                  continue

              # 跳过已在 README 中的贡献者
              if login.lower() in existing_users:
                  print(f"  ⏭️  已存在: {login}")
                  continue

              print(f"  ✨ 新贡献者: {login}")
              # 构建头像 HTML（与现有格式完全一致）
              # 强制将版本参数替换为 v=4，修复旧账号可能返回 v=3 的问题（issue #31）
              avatar_url_v4 = re.sub(r'\?v=\d+', '?v=4', avatar_url)
              avatar_48 = f"{avatar_url_v4}&s=48"
              new_html_parts.append(
                  f'<a href="{html_url}"><img src="{avatar_48}" width="48" height="48" alt="{login}" title="{login}"/></a>'
              )

          if not new_html_parts:
              print("\n✅ 没有新贡献者需要添加，README 无需更新")
              sys.exit(0)

          print(f"\n📝 添加 {len(new_html_parts)} 位新贡献者到 README...")

          # 在 contributors 区域的 </p> 前插入新贡献者头像
          # README 中 contributors 区域格式：
          #   ## 贡献者
          #   <p align="left">
          #     <a href="..."><img .../></a> ...
          #   </p>
          import glob

          new_html_str = " " + " ".join(new_html_parts)
          readme_files = glob.glob("README*.md")
          print(f"📋 找到 {len(readme_files)} 个 README 文件")

          pattern = r'(<p align="left" id="contributors">)(.*?)(</p>)'

          def replacer(m):
              existing_block = m.group(2).rstrip()
              return m.group(1) + existing_block + new_html_str + "\n" + m.group(3)

          updated_files = []
          for readme_file in readme_files:
              with open(readme_file, "r", encoding="utf-8") as f:
                  content = f.read()
              updated_content = re.sub(pattern, replacer, content, flags=re.DOTALL)
              if updated_content != content:
                  with open(readme_file, "w", encoding="utf-8") as f:
                      f.write(updated_content)
                  updated_files.append(readme_file)
                  print(f"  ✅ {readme_file} 已更新")

          if not updated_files:
              print("⚠️  未找到 contributors 区域，跳过更新")
              sys.exit(0)

          print(f"\n✅ 共更新 {len(updated_files)} 个 README 文件")
          PYEOF

      - name: Create Pull Request if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet "README*.md"; then
            echo "✅ 所有 README 文件无变化，无需提交"
            exit 0
          fi

          # 创建新分支
          BRANCH_NAME="update-contributors-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH_NAME"

          git add "README*.md"
          git commit -m "chore: 自动更新 README contributors [skip ci]"
          git push origin "$BRANCH_NAME"

          # 创建 PR
          gh pr create \
            --title "chore: 自动更新 README contributors" \
            --body "🤖 由 GitHub Actions 自动生成

          此 PR 自动更新所有 README 文件中的贡献者列表。

          ### 更新内容
          - 同步 GitHub contributors API 中的新贡献者
          - 更新所有语言版本的 README 文件

          ---
          *此 PR 由 \`.github/workflows/update-contributors.yml\` 工作流自动创建*" \
            --base main \
            --head "$BRANCH_NAME"

          echo "🚀 已创建 PR: update-contributors"
