name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: ['18', '20', '22']
        exclude:
          # Only run full matrix on ubuntu; other OS use LTS only
          - os: macos-latest
            node-version: '18'
          - os: macos-latest
            node-version: '22'
          - os: windows-latest
            node-version: '18'
          - os: windows-latest
            node-version: '22'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --ignore-scripts

    - name: Validate project structure
      run: |
        node -e "
          const fs = require('fs');
          const path = require('path');

          const requiredDirs = ['bin', 'lib', 'project', 'yida-skills', 'scripts'];
          const requiredFiles = ['bin/yida.js', 'package.json', 'project/config.json'];

          for (const dir of requiredDirs) {
            if (!fs.existsSync(dir)) {
              console.error('Missing directory: ' + dir);
              process.exit(1);
            }
          }
          for (const file of requiredFiles) {
            if (!fs.existsSync(file)) {
              console.error('Missing file: ' + file);
              process.exit(1);
            }
          }

          const skillsDir = 'yida-skills/skills';
          if (fs.existsSync(skillsDir)) {
            const skills = fs.readdirSync(skillsDir).filter(n =>
              fs.statSync(path.join(skillsDir, n)).isDirectory()
            );
            console.log('yida-skills sub-skills: ' + skills.length);
          }

          const libFiles = fs.readdirSync('lib').filter(f => f.endsWith('.js'));
          console.log('lib/ modules: ' + libFiles.length);
          console.log('Project structure OK');
        "

    - name: Check JavaScript syntax
      run: |
        node --check bin/yida.js
        for f in lib/*.js; do node --check "$f"; done
        echo "All JS files passed syntax check"
      shell: bash

    - name: Run tests
      run: npm test

    - name: Upload coverage report
      if: matrix.os == 'ubuntu-latest' && matrix.node-version == '20'
      run: npm run test:coverage
