name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Validate project structure
      run: |
        echo "📦 验证项目结构..."
        node -e "
          const fs = require('fs');
          const path = require('path');

          const requiredDirs = ['bin', 'lib', 'project', 'yida-skills', 'scripts'];
          const requiredFiles = ['bin/yida.js', 'package.json', 'project/config.json'];

          for (const dir of requiredDirs) {
            if (!fs.existsSync(dir)) {
              console.error('❌ 缺少目录：' + dir);
              process.exit(1);
            }
          }
          for (const file of requiredFiles) {
            if (!fs.existsSync(file)) {
              console.error('❌ 缺少文件：' + file);
              process.exit(1);
            }
          }

          const skillsDir = 'yida-skills/skills';
          if (fs.existsSync(skillsDir)) {
            const skills = fs.readdirSync(skillsDir).filter(n =>
              fs.statSync(path.join(skillsDir, n)).isDirectory()
            );
            console.log('✅ yida-skills 子技能：' + skills.length + ' 个');
            skills.forEach(s => console.log('  - ' + s));
          }

          const libFiles = fs.readdirSync('lib').filter(f => f.endsWith('.js'));
          console.log('✅ lib/ 模块：' + libFiles.length + ' 个');
        "

    - name: Validate JavaScript syntax
      run: |
        node --check bin/yida.js
        for f in lib/*.js; do node --check "$f" && echo "  ✅ $f"; done
        echo "✅ 所有 JS 文件语法检查通过"
      shell: bash

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test

    - name: Run tests with coverage (ubuntu only)
      if: matrix.os == 'ubuntu-latest'
      run: npm run test:coverage
