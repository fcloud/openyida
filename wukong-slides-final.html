    <style>
        /* ===========================================
           CSS CUSTOM PROPERTIES (THEME)
           Electric Studio - Clean, professional, high contrast
           =========================================== */
        :root {
            --bg-dark: #0a0a0a;
            --bg-white: #ffffff;
            --bg-cream: #faf9f7;
            --accent-blue: #4361ee;
            --accent-teal: #00c9a7;
            --accent-orange: #ff6b35;
            --accent-purple: #c084fc;
            --text-dark: #0a0a0a;
            --text-light: #ffffff;
            --text-gray: #666666;
            --text-muted: #999999;

            --font-display: 'Manrope', sans-serif;
            --font-body: 'Manrope', sans-serif;
            
            --title-size: clamp(2rem, 6vw, 5rem);
            --subtitle-size: clamp(0.875rem, 2vw, 1.25rem);
            --body-size: clamp(0.75rem, 1.2vw, 1rem);
            
            --slide-padding: clamp(1.5rem, 4vw, 4rem);
            --content-gap: clamp(1rem, 2vw, 2rem);
            
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --duration-normal: 0.6s;
        }

        /* ===========================================
           VIEWPORT FITTING: MANDATORY BASE STYLES
           =========================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow-x: hidden;
            font-family: var(--font-body);
        }

        html {
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        .slide {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .slide-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            max-height: 100%;
            overflow: hidden;
            padding: var(--slide-padding);
        }

        /* Typography */
        :root {
            --title-size: clamp(1.5rem, 5vw, 4rem);
            --h2-size: clamp(1.25rem, 3.5vw, 2.5rem);
            --h3-size: clamp(1rem, 2.5vw, 1.75rem);
            --body-size: clamp(0.75rem, 1.5vw, 1.125rem);
            --small-size: clamp(0.65rem, 1vw, 0.875rem);
            --slide-padding: clamp(1rem, 4vw, 4rem);
            --content-gap: clamp(0.5rem, 2vw, 2rem);
            --element-gap: clamp(0.25rem, 1vw, 1rem);
        }

        .card, .container, .content-box {
            max-width: min(90vw, 1000px);
            max-height: min(80vh, 700px);
        }

        .feature-list, .bullet-list {
            gap: clamp(0.4rem, 1vh, 1rem);
        }

        .feature-list li, .bullet-list li {
            font-size: var(--body-size);
            line-height: 1.4;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 250px), 1fr));
            gap: clamp(0.5rem, 1.5vw, 1rem);
        }

        img, .image-container {
            max-width: 100%;
            max-height: min(50vh, 400px);
            object-fit: contain;
        }

        @media (max-height: 700px) {
            :root {
                --slide-padding: clamp(0.75rem, 3vw, 2rem);
                --content-gap: clamp(0.4rem, 1.5vw, 1rem);
                --title-size: clamp(1.25rem, 4.5vw, 2.5rem);
                --h2-size: clamp(1rem, 3vw, 1.75rem);
            }
        }

        @media (max-height: 600px) {
            :root {
                --slide-padding: clamp(0.5rem, 2.5vw, 1.5rem);
                --content-gap: clamp(0.3rem, 1vw, 0.75rem);
                --title-size: clamp(1.1rem, 4vw, 2rem);
                --body-size: clamp(0.7rem, 1.2vw, 0.95rem);
            }
            .nav-dots, .keyboard-hint, .decorative {
                display: none;
            }
        }

        @media (max-height: 500px) {
            :root {
                --slide-padding: clamp(0.4rem, 2vw, 1rem);
                --title-size: clamp(1rem, 3.5vw, 1.5rem);
                --h2-size: clamp(0.9rem, 2.5vw, 1.25rem);
                --body-size: clamp(0.65rem, 1vw, 0.85rem);
            }
        }

        @media (max-width: 600px) {
            :root {
                --title-size: clamp(1.25rem, 7vw, 2.5rem);
            }
            .grid {
                grid-template-columns: 1fr;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.2s !important;
            }
            html {
                scroll-behavior: auto;
            }
        }

        /* ===========================================
           ANIMATIONS
           =========================================== */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity var(--duration-normal) var(--ease-out-expo),
                        transform var(--duration-normal) var(--ease-out-expo);
        }

        .slide.visible .reveal {
            opacity: 1;
            transform: translateY(0);
        }

        .reveal:nth-child(1) { transition-delay: 0.1s; }
        .reveal:nth-child(2) { transition-delay: 0.2s; }
        .reveal:nth-child(3) { transition-delay: 0.3s; }
        .reveal:nth-child(4) { transition-delay: 0.4s; }
        .reveal:nth-child(5) { transition-delay: 0.5s; }
        .reveal:nth-child(6) { transition-delay: 0.6s; }

        /* ===========================================
           ELECTRIC STUDIO - SLIDE STYLES
           =========================================== */

        /* Cover Slide */
        .slide-cover {
            background: var(--bg-white);
            display: grid;
            grid-template-rows: auto 1fr auto;
        }

        .slide-cover .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--slide-padding);
            font-size: var(--small-size);
            color: var(--text-muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .slide-cover .main-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 var(--slide-padding);
        }

        .slide-cover h1 {
            font-family: var(--font-display);
            font-size: clamp(2.5rem, 8vw, 6rem);
            font-weight: 800;
            color: var(--text-dark);
            line-height: 1.1;
            margin-bottom: var(--content-gap);
        }

        .slide-cover h1 span {
            display: block;
            color: var(--accent-teal);
        }

        .slide-cover .subtitle {
            font-size: clamp(1rem, 2.5vw, 1.5rem);
            color: var(--text-gray);
            font-weight: 500;
            max-width: 600px;
        }

        .slide-cover .bottom-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--slide-padding);
            border-top: 1px solid rgba(0,0,0,0.1);
            font-size: var(--small-size);
            color: var(--text-muted);
        }

        .slide-cover .accent-line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--accent-teal);
        }

        /* TOC Slide */
        .slide-toc {
            background: var(--bg-dark);
            color: var(--text-light);
        }

        .slide-toc .toc-header {
            font-size: var(--small-size);
            color: var(--accent-teal);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: var(--content-gap);
        }

        .slide-toc h2 {
            font-size: var(--title-size);
            font-weight: 800;
            margin-bottom: var(--content-gap);
        }

        .slide-toc .toc-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--content-gap);
        }

        .slide-toc .toc-item {
            border-left: 2px solid rgba(255,255,255,0.2);
            padding-left: var(--element-gap);
            transition: all 0.3s ease;
        }

        .slide-toc .toc-item:hover {
            border-left-color: var(--accent-teal);
        }

        .slide-toc .toc-num {
            font-size: var(--h3-size);
            font-weight: 700;
            color: var(--accent-teal);
            display: block;
            margin-bottom: 0.5rem;
        }

        .slide-toc .toc-title {
            font-size: var(--h3-size);
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .slide-toc .toc-desc {
            font-size: var(--body-size);
            color: var(--text-muted);
        }

        /* Chapter Slide */
        .slide-chapter {
            background: var(--bg-cream);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .slide-chapter .chapter-tag {
            font-size: var(--small-size);
            color: var(--accent-teal);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: var(--element-gap);
        }

        .slide-chapter h1 {
            font-size: clamp(2.5rem, 7vw, 5rem);
            font-weight: 800;
            color: var(--text-dark);
            line-height: 1.1;
            margin-bottom: var(--content-gap);
        }

        .slide-chapter .chapter-subtitle {
            font-size: var(--h3-size);
            color: var(--text-gray);
            max-width: 600px;
        }

        .slide-chapter .chapter-desc {
            font-size: var(--body-size);
            color: var(--text-muted);
            margin-top: var(--element-gap);
            max-width: 500px;
        }

        /* Key Points Slide */
        .slide-keypoints {
            background: var(--bg-white);
        }

        .slide-keypoints .kp-header {
            font-size: var(--small-size);
            color: var(--accent-teal);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: var(--element-gap);
        }

        .slide-keypoints h2 {
            font-size: var(--h2-size);
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .slide-keypoints .kp-subtitle {
            font-size: var(--body-size);
            color: var(--text-gray);
            margin-bottom: var(--content-gap);
        }

        .slide-keypoints .points-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--content-gap);
        }

        .slide-keypoints .point-card {
            background: var(--bg-cream);
            padding: var(--content-gap);
            border-radius: 8px;
        }

        .slide-keypoints .point-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .slide-keypoints .point-label {
            font-size: var(--h3-size);
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .slide-keypoints .point-desc {
            font-size: var(--body-size);
            color: var(--text-gray);
            line-height: 1.5;
        }

        /* Image Text Slide */
        .slide-imagetext {
            background: var(--bg-white);
        }

        .slide-imagetext .it-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--content-gap);
            align-items: center;
            height: 100%;
        }

        .slide-imagetext .it-header {
            font-size: var(--small-size);
            color: var(--accent-teal);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: var(--element-gap);
        }

        .slide-imagetext h2 {
            font-size: var(--h2-size);
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .slide-imagetext .it-subtitle {
            font-size: var(--body-size);
            color: var(--text-gray);
            margin-bottom: var(--content-gap);
        }

        .slide-imagetext .it-body {
            font-size: var(--body-size);
            color: var(--text-dark);
            line-height: 1.8;
            white-space: pre-line;
        }

        .slide-imagetext .it-image {
            width: 100%;
            max-height: min(50vh, 400px);
            object-fit: contain;
            border-radius: 8px;
        }

        /* Scene Slide */
        .slide-scene {
            background: var(--bg-cream);
        }

        .slide-scene .scene-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--content-gap);
            align-items: start;
            height: 100%;
        }

        .slide-scene .scene-header {
            display: flex;
            gap: var(--element-gap);
            margin-bottom: var(--element-gap);
            align-items: center;
        }

        .slide-scene .scene-chapter {
            font-size: var(--small-size);
            color: var(--accent-blue);
        }

        .slide-scene .scene-badge {
            font-size: var(--small-size);
            padding: 0.25rem 0.75rem;
            background: rgba(0,0,0,0.05);
            border-radius: 4px;
            color: var(--text-gray);
        }

        .slide-scene .scene-tag {
            font-size: var(--small-size);
            padding: 0.25rem 0.75rem;
            background: var(--accent-blue);
            color: white;
            border-radius: 4px;
        }

        .slide-scene h2 {
            font-size: var(--h2-size);
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .slide-scene .scene-subtitle {
            font-size: var(--body-size);
            color: var(--text-gray);
            margin-bottom: var(--content-gap);
        }

        .slide-scene .scene-body {
            font-size: var(--body-size);
            color: var(--text-dark);
            line-height: 1.8;
            white-space: pre-line;
        }

        .slide-scene .scene-image {
            width: 100%;
            max-height: min(50vh, 400px);
            object-fit: contain;
            border-radius: 8px;
        }

        /* Navigation */
        .nav-dots {
            position: fixed;
            right: 2vw;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 1vh;
            z-index: 1000;
        }

        .nav-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-dot.active {
            background: var(--accent-teal);
            transform: scale(1.3);
        }

        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: var(--accent-teal);
            width: 0%;
            z-index: 1001;
            transition: width 0.3s ease;
        }

        /* Edit Mode Toggle */
        .edit-hotzone {
            position: fixed;
            top: 0;
            left: 0;
            width: 80px;
            height: 80px;
            z-index: 10000;
            cursor: pointer;
        }

        .edit-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent-teal);
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 10001;
        }

        .edit-toggle.show,
        .edit-toggle.active {
            opacity: 1;
            pointer-events: auto;
        }

        [contenteditable="true"] {
            outline: 2px dashed var(--accent-teal);
            outline-offset: 4px;
        }

        .edit-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-size: 0.8rem;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 10002;
        }

        .edit-hint.visible {
            opacity: 1;
        }
    </style>
</head>

        // ===========================================
        // RENDER FUNCTIONS
        // ===========================================
        function renderSlide(slide, index) {
            const content = renderSlideContent(slide);
            return `<section class="slide slide-${slide.type}" id="slide-${index}" data-index="${index}">${content}</section>`;
        }

        function renderSlideContent(slide) {
            switch(slide.type) {
                case 'cover': return renderCover(slide);
                case 'toc': return renderToc(slide);
                case 'keypoints': return renderKeyPoints(slide);
                case 'imagetext': return renderImageText(slide);
                case 'chapter': return renderChapter(slide);
                case 'scene': return renderScene(slide);
                default: return '';
            }
        }

        function renderCover(slide) {
            return `
                <div class="top-bar reveal">
                    <span>${slide.eyebrow}</span>
                    <span>悟空 AI-Native</span>
                </div>
                <div class="main-content reveal">
                    <h1>${slide.title}</h1>
                    <p class="subtitle">${slide.subtitle}</p>
                </div>
                <div class="bottom-bar reveal">
                    <span>${slide.meta}</span>
                    <span>→</span>
                </div>
                <div class="accent-line"></div>
            `;
        }

        function renderToc(slide) {
            return `
                <div class="slide-content">
                    <span class="toc-header reveal">Contents</span>
                    <h2 class="reveal">${slide.title}</h2>
                    <div class="toc-grid">
                        ${slide.items.map((item, i) => `
                            <div class="toc-item reveal" style="transition-delay: ${0.1 * (i + 1)}s">
                                <span class="toc-num">${item.num}</span>
                                <div class="toc-title">${item.title}</div>
                                <div class="toc-desc">${item.desc}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderKeyPoints(slide) {
            return `
                <div class="slide-content">
                    <span class="kp-header reveal">${slide.chapter}</span>
                    <h2 class="reveal">${slide.title}</h2>
                    <p class="kp-subtitle reveal">${slide.subtitle}</p>
                    <div class="points-grid">
                        ${slide.points.map((point, i) => `
                            <div class="point-card reveal" style="transition-delay: ${0.1 * (i + 1)}s">
                                <div class="point-icon">${point.icon}</div>
                                <div class="point-label">${point.label}</div>
                                <div class="point-desc">${point.desc}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderImageText(slide) {
            return `
                <div class="slide-content">
                    <div class="it-layout">
                        <div class="it-text">
                            <span class="it-header reveal">${slide.chapter}</span>
                            <h2 class="reveal">${slide.title}</h2>
                            <p class="it-subtitle reveal">${slide.subtitle}</p>
                            <p class="it-body reveal">${slide.body}</p>
                        </div>
                        <div class="it-media reveal">
                            <img src="${slide.imageUrl}" alt="${slide.imageLabel}" class="it-image" referrerpolicy="no-referrer" loading="lazy">
                        </div>
                    </div>
                </div>
            `;
        }

        function renderChapter(slide) {
            const descHtml = slide.desc ? `<p class="chapter-desc reveal">${slide.desc}</p>` : '';
            return `
                <div class="slide-content" style="align-items: center; text-align: center;">
                    <span class="chapter-tag reveal">${slide.partNum}</span>
                    <h1 class="reveal">${slide.title}</h1>
                    <p class="chapter-subtitle reveal">${slide.subtitle}</p>
                    ${descHtml}
                </div>
            `;
        }

        function renderScene(slide) {
            return `
                <div class="slide-content">
                    <div class="scene-layout">
                        <div class="scene-text">
                            <div class="scene-header reveal">
                                <span class="scene-chapter">${slide.chapter}</span>
                                <span class="scene-badge">${slide.sceneNum}</span>
                                <span class="scene-tag">${slide.tag}</span>
                            </div>
                            <h2 class="reveal">${slide.title}</h2>
                            <p class="scene-subtitle reveal">${slide.subtitle}</p>
                            <p class="scene-body reveal">${slide.body}</p>
                        </div>
                        <div class="scene-media reveal">
                            <img src="${slide.imageUrl}" alt="${slide.imageLabel}" class="scene-image" referrerpolicy="no-referrer" loading="lazy">
                        </div>
                    </div>
                </div>
            `;
        }

        // ===========================================
        // SLIDE PRESENTATION CONTROLLER
        // ===========================================
        class SlidePresentation {
            constructor() {
                this.slides = [];
                this.currentSlide = 0;
                this.isEditMode = false;
                this.init();
            }

            init() {
                this.renderSlides();
                this.setupIntersectionObserver();
                this.setupKeyboardNav();
                this.setupTouchNav();
                this.setupProgressBar();
                this.setupNavDots();
                this.setupEditMode();
            }

            renderSlides() {
                const deck = document.getElementById('deck');
                deck.innerHTML = SLIDES.map((slide, index) => renderSlide(slide, index)).join('');
                this.slides = document.querySelectorAll('.slide');
            }

            setupIntersectionObserver() {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                            this.currentSlide = parseInt(entry.target.dataset.index);
                            this.updateNavDots();
                            this.updateProgressBar();
                        }
                    });
                }, { threshold: 0.5 });

                this.slides.forEach(slide => observer.observe(slide));
            }

            setupKeyboardNav() {
                document.addEventListener('keydown', (e) => {
                    if (this.isEditMode && e.target.getAttribute('contenteditable')) return;
                    
                    if (e.key === 'ArrowDown' || e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {
                        e.preventDefault();
                        this.nextSlide();
                    } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft' || e.key === 'PageUp') {
                        e.preventDefault();
                        this.prevSlide();
                    } else if (e.key === 'Home') {
                        e.preventDefault();
                        this.goToSlide(0);
                    } else if (e.key === 'End') {
                        e.preventDefault();
                        this.goToSlide(this.slides.length - 1);
                    }
                });
            }

            setupTouchNav() {
                let touchStartY = 0;
                document.addEventListener('touchstart', (e) => {
                    touchStartY = e.touches[0].clientY;
                });
                document.addEventListener('touchend', (e) => {
                    const touchEndY = e.changedTouches[0].clientY;
                    const diff = touchStartY - touchEndY;
                    if (Math.abs(diff) > 50) {
                        if (diff > 0) this.nextSlide();
                        else this.prevSlide();
                    }
                });
            }

            setupProgressBar() {
                this.progressBar = document.getElementById('progressBar');
            }

            setupNavDots() {
                const navDots = document.getElementById('navDots');
                navDots.innerHTML = SLIDES.map((_, i) => 
                    `<div class="nav-dot ${i === 0 ? 'active' : ''}" data-index="${i}"></div>`
                ).join('');

                navDots.querySelectorAll('.nav-dot').forEach(dot => {
                    dot.addEventListener('click', () => {
                        this.goToSlide(parseInt(dot.dataset.index));
                    });
                });
            }

            setupEditMode() {
                const hotzone = document.getElementById('editHotzone');
                const toggle = document.getElementById('editToggle');
                const hint = document.getElementById('editHint');
                let hideTimeout = null;

                const showToggle = () => {
                    clearTimeout(hideTimeout);
                    toggle.classList.add('show');
                };

                const hideToggle = () => {
                    hideTimeout = setTimeout(() => {
                        if (!this.isEditMode) toggle.classList.remove('show');
                    }, 400);
                };

                hotzone.addEventListener('mouseenter', showToggle);
                hotzone.addEventListener('mouseleave', hideToggle);
                toggle.addEventListener('mouseenter', () => clearTimeout(hideTimeout));
                toggle.addEventListener('mouseleave', hideToggle);
                hotzone.addEventListener('click', () => this.toggleEditMode());
                toggle.addEventListener('click', () => this.toggleEditMode());

                document.addEventListener('keydown', (e) => {
                    if ((e.key === 'e' || e.key === 'E') && !e.target.getAttribute('contenteditable')) {
                        this.toggleEditMode();
                    }
                    if (e.key === 's' && e.ctrlKey && this.isEditMode) {
                        e.preventDefault();
                        this.saveContent();
                    }
                });

                this.editHint = hint;
            }

            toggleEditMode() {
                this.isEditMode = !this.isEditMode;
                const toggle = document.getElementById('editToggle');
                toggle.classList.toggle('active', this.isEditMode);
                this.editHint.classList.toggle('visible', this.isEditMode);

                document.querySelectorAll('.slide h1, .slide h2, .slide p, .slide .point-label, .slide .point-desc, .slide .toc-title, .slide .toc-desc').forEach(el => {
                    el.setAttribute('contenteditable', this.isEditMode);
                });
            }

            saveContent() {
                const content = {};
                document.querySelectorAll('[contenteditable="true"]').forEach((el, i) => {
                    content[i] = el.innerText;
                });
                localStorage.setItem('slideContent', JSON.stringify(content));
                alert('内容已保存到本地存储');
            }

            nextSlide() {
                if (this.currentSlide < this.slides.length - 1) {
                    this.goToSlide(this.currentSlide + 1);
                }
            }

            prevSlide() {
                if (this.currentSlide > 0) {
                    this.goToSlide(this.currentSlide - 1);
                }
            }

            goToSlide(index) {
                if (index >= 0 && index < this.slides.length) {
                    this.slides[index].scrollIntoView({ behavior: 'smooth' });
                }
            }

            updateNavDots() {
                document.querySelectorAll('.nav-dot').forEach((dot, i) => {
                    dot.classList.toggle('active', i === this.currentSlide);
                });
            }

            updateProgressBar() {
                const progress = ((this.currentSlide + 1) / this.slides.length) * 100;
                this.progressBar.style.width = `${progress}%`;
            }
        }

        // Initialize
        new SlidePresentation();
    </script>
